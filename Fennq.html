<script>

// в”Җв”Җ INTENT CLASSIFIER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Priority order matters. Self-referential checks come FIRST so
// "who created you" never falls through to a Wikipedia search.

const SELF_PATTERNS = [
    // в”Җв”Җ English: 2nd person (you/your) в”Җв”Җ
    /\b(who|what)\s+(are|is|r)\s+you\b/i,
    /\byour\s+(name|creator|maker|author|developer|programmer|owner|purpose|goal|function|age|version)\b/i,
    /\bwho\s+(made|built|created|developed|coded|programmed|designed|wrote)\s+you\b/i,
    /\b(are|were)\s+you\s+(made|built|created|designed|coded)\b/i,
    /\bhow\s+(were|was|are)\s+you\s+(made|built|created|programmed|trained|work)\b/i,
    /\bwhat\s+(can\s+you|do\s+you)\s+do\b/i,
    /\bare\s+you\s+(an?\s+)?(ai|bot|robot|human|person|assistant|program|software|real)\b/i,
    /\bdo\s+you\s+(know|think|feel|have|remember|understand)\b/i,
    // в”Җв”Җ English: 3rd person about Fenneq в”Җв”Җ
    /\bwho\s+(made|built|created|developed|coded|programmed|designed|wrote|invented)\s+fenneq\b/i,
    /\bwho\s+(is|was)\s+(fenneq|its|the)\s*(creator|maker|author|developer|programmer)?\b/i,
    /\bwhat\s+is\s+fenneq\b/i,
    /\bhow\s+(does|did)\s+fenneq\s+(work|function|think)\b/i,
    /\bwho\s+(created?|made|built)\s+(it|him|this|the\s+bot|the\s+ai|the\s+assistant)\b/i,
    // в”Җв”Җ Spanish: 2nd person (te/tГә/tu) в”Җв”Җ
    /\bquiГ©n?\s+eres\b/i,
    /\bquГ©?\s+eres\b/i,
    /\bcГіmo?\s+te\s+llamas\b/i,
    /\bcomo\s+te\s+llamas\b/i,
    /\b(quiГ©n?|quien)\s+te\s+(hizo|creГі|creo|programГі|programo|desarrollГі|desarrollo|inventГі|invento|diseГұГі|diseno|construyГі|construyo)\b/i,
    /\bte\s+(hizo|creГі|creo|programГі|programo)\s*(quien|alguien)?\b/i,
    /\bquiГ©n?\s+te\s+creo\b/i,
    /\bcГіmo?\s+(funciona[sz]?|trabaja[sz]?)\b/i,
    /\bpara\s+quГ©?\s+(sirves|eres)\b/i,
    /\bquГ©?\s+(puedes\s+hacer|sabes\s+hacer)\b/i,
    // в”Җв”Җ Spanish: 3rd person about Fenneq / "lo" в”Җв”Җ
    /\bquiГ©n?\s+(lo|la|le)\s+(hizo|creГі|creo|programГі|programo|desarrollГі|desarrollo|inventГі|invento|diseГұГі|diseno|construyГі|construyo)\b/i,
    /\bquiГ©n?\s+(creГі|creo|hizo|programГі|programo|desarrollГі|desarrollo)\s+(a\s+)?(fenneq|esto|este|el\s+bot|la\s+ia|la\s+inteligencia)\b/i,
    /\b(quГ©|que)\s+es\s+fenneq\b/i,
    /\bcГіmo?\s+(funciona|trabaja)\s+fenneq\b/i,
    /\bde\s+dГіnde?\s+(vienes|viene\s+fenneq|eres|saliste)\b/i,
];

const SELF_HELP_PATTERNS = [
    /^(help|ayuda|commands|comandos|menu|what can you do|que puedes hacer)[?!\s.]*$/i,
    /\b(what|que|cuales).*(commands?|features?|skills?|capabilities|things?).*(can|you|have)\b/i,
];

function classify(t){
    // в‘  SELF вҖ” anything about Fenneq itself (MUST be before wiki/search)
    for(const rx of SELF_PATTERNS) if(rx.test(t)) return 'selfinfo';
    for(const rx of SELF_HELP_PATTERNS) if(rx.test(t)) return 'help';

    // в‘Ў Simple social
    if(/^(hi|hello|hey|sup|hola|buenas|good (morning|evening|night)|wassup|yo)[!?.\s]*$/i.test(t)) return 'greet';
    if(/^(bye|goodbye|cya|later|adios|adiГіs|chao|chau|hasta|see\s*ya)[!?.\s]*$/i.test(t)) return 'bye';
    if(/^(thanks|thank you|thx|gracias|ty|cheers)[!?.\s]*$/i.test(t)) return 'thanks';
    if(/\b(how are you|cГіmo estГЎs|como estas|how r u|how you doing)\b/i.test(t)) return 'howru';

    // в‘ў Name memory
    if(/\b(my name is|me llamo|call me|i am|i'm|soy)\s+\w+/i.test(t)) return 'setname';

    // в‘Ј Functional intents
    if(/\b(weather|clima|temperatura|forecast|lluvia|rain|sunny|how hot|how cold|temperature in)\b/i.test(t)) return 'weather';
    if(/\b(what time|quГ© hora|que hora|hora actual|time is it|current time)\b/i.test(t)) return 'time';
    if(/\b(what day|quГ© dГӯa|que dia|today's date|what is today|fecha de hoy)\b/i.test(t)) return 'date';
    if(/\d[\+\-\*\/\^]\d/.test(t)||/\b(calculat|compute|cuanto es|cuГЎnto es|sqrt|factorial|how much is \d|divided by|times \d|\d plus \d|\d minus \d)\b/i.test(t)) return 'math';
    if(/\b(translate|traduce|traducir|how do you say|in spanish|in english|in french|in german|in japanese)\b/i.test(t)) return 'translate';
    if((/\b(usd|eur|gbp|jpy|mxn|cad|btc|eth)\b/i.test(t)&&/\b(to|a|en|in)\b/i.test(t))||/\b(exchange rate|currency|convert.*moneda)\b/i.test(t)) return 'currency';
    if(/\b(joke|chiste|funny|make me laugh|tell me a joke|cuenta un chiste)\b/i.test(t)) return 'joke';
    if(/\b(my ip|mi ip|ip address|what is my ip|cual es mi ip)\b/i.test(t)) return 'ip';
    if(/\b(quote|frase|inspirat|motivat|dame una frase|give me a quote)\b/i.test(t)) return 'quote';

    // в‘Ө Fallback вҖ” external search
    return 'wiki';
}

function extractEntity(text){
    return text.replace(/^(what is|what are|who is|who are|define|tell me about|explain|cuГ©ntame sobre|que es|quГ© es|quien es|quiГ©n es|habla(me)? de|busca|search for|find)\s+/i,'').replace(/[?!.]+$/,'').trim();
}

function evalMath(text){
    let expr=text.toLowerCase()
        .replace(/what is|cuanto es|cuГЎnto es|calculate|calculat|compute|solve/gi,'')
        .replace(/plus/g,'+').replace(/minus/g,'-').replace(/times/g,'*').replace(/divided by/g,'/')
        .replace(/\bx\b/g,'*').replace(/\^/g,'**')
        .replace(/sqrt\(([^)]+)\)/g,(_,n)=>Math.sqrt(parseFloat(n)))
        .replace(/factorial\((\d+)\)/g,(_,n)=>{let r=1;for(let i=2;i<=+n;i++)r*=i;return r;})
        .replace(/pi/g,Math.PI).replace(/[^0-9+\-*/.() %\s]/g,'').trim();
    if(!expr||!/\d/.test(expr))return null;
    try{const r=Function('"use strict";return('+expr+')')();if(!isFinite(r))return null;return`${expr.trim()} = <b>${parseFloat(r.toFixed(10))}</b>`;}catch{return null;}
}

function extractLocation(t){return t.replace(/weather|temperatura|clima|lluvia|rain|sunny|forecast|temperature|how hot|how cold|what('s| is) the|in |en |at |de |is it/gi,'').replace(/[?!.]+$/,'').trim();}

function parseCurrency(t){
    const m=t.match(/(\d[\d,.]*)\s*([a-z]{3})\s*(?:to|a|en|in)\s*([a-z]{3})/i);
    if(m)return{amount:parseFloat(m[1].replace(',','.')),from:m[2].toUpperCase(),to:m[3].toUpperCase()};
    const m2=t.match(/([a-z]{3})\s*(?:to|a|en|in)\s*([a-z]{3})/i);
    if(m2)return{amount:1,from:m2[1].toUpperCase(),to:m2[2].toUpperCase()};
    return null;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  FENNEQ SEARCH ENGINE v5
//  Primary: DuckDuckGo HTML result snippets (via CORS proxy)
//  These snippets are context-selected to answer the query.
//  Fallback: DDG JSON instant answers вҶ’ Wikipedia intro
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

const CORS_PROXY = 'https://corsproxy.io/?url=';

const isGood = t => t && t.length > 40 && !/may refer to|disambiguation/i.test(t);
const trim3  = t => (t.match(/[^.!?]+[.!?]+/g)||[t]).slice(0,3).join(' ').trim();

// в”Җв”Җ Scrape real DDG search result snippets в”Җв”Җ
async function ddgScrape(query) {
    try {
        const url = CORS_PROXY + encodeURIComponent(`https://html.duckduckgo.com/html/?q=${encodeURIComponent(query)}`);
        const res = await fetch(url, { headers: { 'User-Agent': 'Mozilla/5.0' } });
        if (!res.ok) return null;
        const html = await res.text();

        const parser = new DOMParser();
        const doc    = parser.parseFromString(html, 'text/html');

        // DDG HTML results: snippets are in .result__snippet elements
        const snippetEls = doc.querySelectorAll('.result__snippet');
        const titleEls   = doc.querySelectorAll('.result__title');
        const linkEls    = doc.querySelectorAll('.result__url');

        const results = [];
        snippetEls.forEach((el, i) => {
            const text = el.textContent.trim();
            const title = titleEls[i]?.textContent?.trim() || '';
            const url   = linkEls[i]?.textContent?.trim() || '';
            if (text.length > 40) results.push({ text, title, url });
        });

        if (!results.length) return null;

        // Combine top 2 snippets for a richer answer
        const top = results.slice(0, 2);
        const combined = top.map(r => r.text).join(' ');
        const sourceTitle = top[0].title;
        const sourceUrl   = top[0].url?.startsWith('http') ? top[0].url : (top[0].url ? 'https://' + top[0].url : '');

        return { text: combined, source: sourceTitle || 'Web', url: sourceUrl };
    } catch {
        return null;
    }
}

// в”Җв”Җ DDG JSON instant answers (good for direct facts) в”Җв”Җ
async function ddgInstant(query) {
    try {
        const r = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1&no_redirect=1`);
        const d = await r.json();
        if (d.Answer?.length > 2)        return { text: d.Answer, source: 'DuckDuckGo', url: '' };
        if (d.AbstractText?.length > 60) return { text: trim3(d.AbstractText), source: d.AbstractSource||'DuckDuckGo', url: d.AbstractURL||'' };
        if (d.Definition?.length > 20)   return { text: d.Definition, source: d.DefinitionSource||'DuckDuckGo', url: d.DefinitionURL||'' };
        const rel = d.RelatedTopics?.find(t => t.Text?.length > 40);
        if (rel) return { text: trim3(rel.Text), source: 'DuckDuckGo', url: rel.FirstURL||'' };
    } catch {}
    return null;
}

// в”Җв”Җ Wikipedia intro (for clean definitions) в”Җв”Җ
async function wikiSummary(topic) {
    try {
        const sr = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(topic)}&format=json&origin=*&srlimit=2`);
        const sd = await sr.json();
        const hits = sd?.query?.search || [];
        for (const hit of hits) {
            const r = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(hit.title)}&prop=extracts&exintro=true&explaintext=true&format=json&origin=*`);
            const d = await r.json();
            const extract = Object.values(d.query.pages)[0]?.extract?.trim();
            if (isGood(extract)) return { title: hit.title, extract, url: `https://en.wikipedia.org/wiki/${encodeURIComponent(hit.title)}` };
        }
    } catch {}
    return null;
}

// в”Җв”Җ Wikidata last resort в”Җв”Җ
async function wikidataSearch(query) {
    try {
        const r = await fetch(`https://www.wikidata.org/w/api.php?action=wbsearchentities&search=${encodeURIComponent(query)}&language=en&limit=3&format=json&origin=*`);
        const d = await r.json();
        const hit = d.search?.find(e => e.description?.length > 10);
        if (hit) return { text: `${hit.label} вҖ” ${hit.description}.`, source: 'Wikidata', url: `https://www.wikidata.org/wiki/${hit.id}` };
    } catch {}
    return null;
}

function fmtResult(text, source, url) {
    const link = url ? ` В· <a href="${url.startsWith('http') ? url : 'https://'+url}" target="_blank" style="color:var(--accent);opacity:.7">open вҶ—</a>` : '';
    return `${text}\n\n<small>via ${source}${link}</small>`;
}

// в”Җв”Җ Classify question type в”Җв”Җ
function getQuestionType(raw) {
    const t = raw.toLowerCase();
    if (/^(what is|what are|define|who is|who was|what was|quГ© es|que es|quiГ©n es|quien es)\b/i.test(t)) return 'definition';
    if (/\b(why|why did|why does|why was|por qu[eГ©])\b/i.test(t))   return 'why';
    if (/\b(how did|how does|how was|how do|cГіmo)\b/i.test(t))      return 'how';
    if (/\b(when did|when was|when is|cuГЎndo|what year)\b/i.test(t)) return 'when';
    if (/\b(where is|where was|where did|dГіnde)\b/i.test(t))        return 'where';
    if (/\b(who (is|was|did|invented|founded|created|made))\b/i.test(t)) return 'who';
    return 'general';
}

// в”Җв”Җ MAIN SEARCH в”Җв”Җ
async function getWiki(raw) {
    if (!raw?.trim()) return "What do you want to know?";

    const clean = raw.replace(/^(hey|ok|please|can you|could you|tell me|do you know)[,\s]*/i,'').replace(/[?!.]+$/,'').trim();
    const qtype = getQuestionType(raw);
    let res;

    // For definitions: DDG instant вҶ’ Wikipedia intro (cleaner than snippets)
    if (qtype === 'definition') {
        res = await ddgInstant(clean);
        if (res?.text) return fmtResult(res.text, res.source, res.url);

        res = await wikiSummary(clean);
        if (res) return fmtResult(`<b>${res.title}</b>\n\n${trim3(res.extract)}`, 'Wikipedia', res.url);
    }

    // For everything else: scrape real DDG HTML snippets вҖ” they answer the question directly
    res = await ddgScrape(clean);
    if (res?.text) return fmtResult(res.text, res.source, res.url);

    // Fallback: DDG instant answer
    res = await ddgInstant(clean);
    if (res?.text) return fmtResult(res.text, res.source, res.url);

    // Fallback: Wikipedia
    res = await wikiSummary(clean);
    if (res) return fmtResult(`<b>${res.title}</b>\n\n${trim3(res.extract)}`, 'Wikipedia', res.url);

    // Last resort: Wikidata
    res = await wikidataSearch(clean);
    if (res) return fmtResult(res.text, res.source, res.url);

    return `Couldn't find an answer for <b>"${clean}"</b>. Try rephrasing it.`;
}



async function getWeather(location){
    if(!location||location.length<2)return"Which city do you want the weather for?";
    try{
        const r=await fetch(`https://wttr.in/${encodeURIComponent(location)}?format=j1`);
        if(!r.ok)throw new Error();
        const d=await r.json();
        const cur=d.current_condition[0];
        const area=d.nearest_area[0];
        const city=area.areaName[0].value,country=area.country[0].value;
        const desc=cur.weatherDesc[0].value;
        return`<b>${city}, ${country}</b>\n${desc}\n\nрҹҢЎ ${cur.temp_C}В°C / ${cur.temp_F}В°F (feels ${cur.FeelsLikeC}В°C)\nрҹ’§ Humidity: ${cur.humidity}%\nрҹ’Ё Wind: ${cur.windspeedKmph} km/h`;
    }catch{return`Couldn't get weather for "${location}". Check the city name?`;}
}

async function getCurrency(text){
    const parsed=parseCurrency(text);
    if(!parsed)return"Try: '100 USD to EUR' or 'GBP to JPY'";
    const{amount,from,to}=parsed;
    try{
        const r=await fetch(`https://api.frankfurter.app/latest?from=${from}&to=${to}`);
        if(!r.ok)throw new Error();
        const d=await r.json();
        const rate=d.rates[to];
        if(!rate)return`Unknown currency pair: ${from} to ${to}`;
        const result=(amount*rate).toFixed(2);
        return`<b>${amount} ${from} = ${result} ${to}</b>\n\nRate: 1 ${from} = ${rate.toFixed(4)} ${to}\n<small>via Frankfurter (ECB data)</small>`;
    }catch{return"Currency service unavailable right now.";}
}

async function getTranslate(text){
    const m=text.match(/translate\s+(.+?)\s+(?:to|in)\s+(\w+)/i)||text.match(/traduce\s+(.+?)\s+(?:al?|en|to)\s+(\w+)/i);
    if(!m)return"Try: 'translate hello to Spanish' or 'translate gracias to English'";
    const phrase=m[1].trim(),langName=m[2].toLowerCase();
    const langMap={spanish:'es',english:'en',french:'fr',german:'de',italian:'it',portuguese:'pt',russian:'ru',japanese:'ja',chinese:'zh',arabic:'ar',espanol:'es',ingles:'en',frances:'fr',aleman:'de'};
    const lang=langMap[langName]||langName.slice(0,2);
    try{
        const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(phrase)}&langpair=auto|${lang}`);
        const d=await r.json();
        const result=d.responseData?.translatedText;
        if(!result||result.toLowerCase()===phrase.toLowerCase())return"Translation unavailable right now.";
        return`"${phrase}" вҶ’ <b>"${result}"</b> (${langName})`;
    }catch{return"Translation service is down right now.";}
}

function getTime(){const now=new Date();return`Right now it's <b>${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</b> (your local time).`;}
function getDate(){const now=new Date();return`Today is <b>${now.toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</b>.`;}
function handleSetName(text){const m=text.match(/(?:my name is|me llamo|call me|i am|i'm|soy)\s+(\w+)/i);if(m){memory.name=m[1];return`Got it, <b>${memory.name}</b>! Nice to meet you.`;}return"What's your name?";}
function selfInfo(input){
    const t=(input||'').toLowerCase();

    // Who created it / who made it (2nd AND 3rd person, EN + ES)
    const isCreatorQ =
        /\b(who|quien|quiГ©n)\b/.test(t) &&
        /\b(made|created|built|hizo|creo|creГі|programГі|programo|coded|developed|invented|diseГұГі|construyГі)\b/.test(t)
        ||
        // "quiГ©n lo creГі" / "quien lo hizo" вҖ” 3rd person "lo/la/le"
        /\b(quien|quiГ©n)\s+(lo|la|le)\s+(hizo|creГі|creo|programГі|programo|desarrollГі|desarrollo|inventГі|invento|diseГұГі|construyГі)\b/.test(t)
        ||
        // "who created it/him/this"
        /\bwho\s+(created?|made|built|developed)\s+(it|him|this|the\s+bot|the\s+ai)\b/.test(t);

    if(isCreatorQ){
        return `Fenneq 4.1 was hand-coded from scratch вҖ” no AI company, no big tech, no model behind it.\n\nIt's a self-contained HTML/JS app that uses free public APIs (Wikipedia, weather, currency, translationвҖҰ) and its own pattern-matching logic to answer questions.\n\nThink of it as a smart router, not a neural network.`;
    }

    // How does it work
    if(/\b(how|como|cГіmo)\b/.test(t)&&/\b(work|funciona|made|built|trained|hecho|opera)\b/.test(t)){
        return`Here's how I work:\n\n1пёҸвғЈ I read your message and classify the intent (weather? math? search?)\n2пёҸвғЈ I route it to the right free API\n3пёҸвғЈ I format the result and reply\n\nрҹ“– <b>Wikipedia</b> вҖ” knowledge\nрҹҢӨ <b>wttr.in</b> вҖ” weather\nрҹ’ұ <b>Frankfurter</b> вҖ” currency\nрҹҢҗ <b>MyMemory</b> вҖ” translation\nрҹҳ„ <b>Joke API</b> вҖ” humor\n\nNo neural network. Just logic. рҹ”§`;
    }

    // Am I an AI / bot / real?
    if(/\b(ai|bot|robot|human|person|artificial|intelligence|programa|software|real|sentient)\b/.test(t)){
        return`I'm a program, not a person вҖ” but I'm not a typical AI either.\n\nNo language model, no training data, no GPU. Just JavaScript + free APIs + pattern matching.\n\nI can't improvise like ChatGPT, but I also don't hallucinate. What I tell you comes from real sources. рҹҺҜ`;
    }

    // What's your name / who are you (identity)
    if(/\b(name|llamas|eres|are\s+you|what\s+is\s+fenneq)\b/.test(t)){
        return`I'm <b>Fenneq 4.1</b>.\n\nA self-built assistant вҖ” no OpenAI, no Google, no Anthropic. Just code, logic, and free public APIs.\n\nType <b>help</b> to see what I can do.`;
    }

    // What can you do
    if(/\b(can\s+you|do\s+you|puedes|sabes|capabilities)\b/.test(t)){
        return`Good question. Here's what I can actually do:\n\nрҹ”Қ Search & explain topics (Wikipedia)\nрҹҢӨ Real-time weather (any city)\nрҹ§® Math calculations\nрҹ’ұ Currency conversion\nрҹҢҗ Translate phrases\nрҹҳ„ Tell jokes\nрҹ’¬ Inspirational quotes\nрҹ“Ў Show your public IP\nрҹ•җ Time & date\n\nAll without any AI model. Just ask naturally!`;
    }

    // Generic fallback
    return`I'm <b>Fenneq 4.1</b> вҖ” a self-contained assistant built from scratch.\n\nNo AI model. No big tech. Just free public APIs and my own logic.\n\nType <b>help</b> to see everything I can do.`;
}

async function fenneqReply(input){
    const t=input.toLowerCase().trim();
    const intent=classify(t);
    await sleep(300+Math.random()*300);
    const nm=memory.name?`${memory.name}, `:'';
    switch(intent){
        case'greet':return nm+rand(greets);
        case'bye':return rand(byeMsgs);
        case'thanks':return rand(thanksMsgs);
        case'howru':return rand(howruMsgs);
        case'help':return helpMsg();
        case'selfinfo':return selfInfo(input);
        case'setname':return handleSetName(t);
        case'time':return getTime();
        case'date':return getDate();
        case'ip':return await getIP();
        case'joke':return await getJoke();
        case'quote':return await getQuote();
        case'translate':return await getTranslate(t);
        case'math':{const r=evalMath(input);return r||"Couldn't parse that math. Try '15 * 34' or 'sqrt(144)'";}
        case'weather':return await getWeather(extractLocation(t));
        case'currency':return await getCurrency(t);
        default:{memory.lastEntity=input;return await getWiki(input);}
    }
}

const chatEl=document.getElementById('chat');
const inp=document.getElementById('inp');
const sendBtn=document.getElementById('sendBtn');

function addWrapper(role){const w=document.createElement('div');w.className=`wrap ${role}`;const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent=role==='user'?'YOU':'FENNEQ';w.appendChild(lbl);chatEl.appendChild(w);return w;}

function addBubble(html,role){
    const w=addWrapper(role);
    const b=document.createElement('div');b.className=`bubble ${role}`;
    b.innerHTML=html.replace(/\n/g,'<br>');
    w.appendChild(b);scrollDown();return b;
}

function addTyping(){const w=addWrapper('bot');const t=document.createElement('div');t.className='typing';t.innerHTML='<span></span><span></span><span></span>';w.appendChild(t);scrollDown();return w;}
function scrollDown(){chatEl.scrollTop=chatEl.scrollHeight;}
function setLoading(on){sendBtn.disabled=on;inp.disabled=on;}

async function go(){
    const val=inp.value.trim();if(!val)return;
    addBubble(val.replace(/</g,'&lt;').replace(/>/g,'&gt;'),'user');
    inp.value='';setLoading(true);
    const tw=addTyping();
    let reply;
    try{reply=await fenneqReply(val);}catch(e){reply="Something went wrong. Try again.";}
    tw.remove();addBubble(reply,'bot');
    setLoading(false);inp.focus();
}

function clearChat(){chatEl.innerHTML='';memory.name=null;memory.lastEntity=null;setTimeout(()=>addBubble("Memory cleared. Fresh start!",'bot'),150);}

inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}});

setTimeout(()=>{
    addBubble("Hey, I'm <b>Fenneq</b>. рҹ‘Ӣ\n\nI'm not quite like other AI chatbots вҖ” because I'm not really an AI chatbot. I was built to help you find information fast, pulling from real sources across the web in seconds.\n\nI can find almost anything: definitions, weather, currency, translations, facts, and more.\n\nI was made by a solo dev (<b>Freud</b>), so don't be too hard on me if you spot a bug here or there. If you don't get the answer you wanted, try being more specific вҖ” it helps a lot.\n\nWhat do you need?",'bot');
    inp.focus();
},350);
</script>
